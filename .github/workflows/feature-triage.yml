name: Weekly Feature-Request Triage

# Refreshes docs/feature-triage.md from the live feature-request API and opens a
# PR when anything substantive changed. Runs in GitHub Actions (not the Claude
# cloud sandbox) because the sandbox's egress proxy blocks outbound calls to the
# API host; GH runners have unrestricted egress.

on:
  schedule:
    - cron: '0 16 * * 1' # Mondays 16:00 UTC = 9:00am America/Phoenix
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch + regenerate triage doc
        id: refresh
        run: |
          python3 scripts/feature-triage/fetch.py
          RAW=$(python3 scripts/feature-triage/generate.py 2>&1 | tail -1)
          # Extract the "N active, M shipped, K untriaged" summary for the PR body.
          SUMMARY=$(printf '%s' "$RAW" | sed -E 's/.*\((.*)\)/\1/')
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "Refresh summary: $SUMMARY"

      - name: Detect substantive change (ignore timestamp-only diffs)
        id: diff
        run: |
          if git diff --quiet -- docs/feature-triage.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No change to the doc."
            exit 0
          fi
          # A refresh that only bumped the "_Auto-generated ..." timestamp line is
          # not worth a PR. Strip file headers + the timestamp line and see if any
          # real content changed.
          SUBSTANTIVE=$(git diff -U0 -- docs/feature-triage.md \
            | grep -E '^[+-]' \
            | grep -vE '^(\+\+\+|---)' \
            | grep -vE '_Auto-generated ' || true)
          if [ -z "$SUBSTANTIVE" ]; then
            echo "Only the timestamp changed; reverting, no PR."
            git checkout -- docs/feature-triage.md
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Substantive changes detected."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: |
            docs/feature-triage.md
            scripts/feature-triage/triage.json
          branch: chore/feature-triage-weekly-refresh
          delete-branch: true
          title: 'chore: weekly feature-request triage refresh'
          commit-message: |
            chore: weekly feature-request triage refresh

            Auto-generated by the Weekly Feature-Request Triage workflow.

            Co-Authored-By: Claude Opus 4.8 (1M context) <noreply@anthropic.com>
          body: |
            Automated weekly refresh of the feature-request triage living doc.

            **Snapshot:** ${{ steps.refresh.outputs.summary }}

            If any requests appear under the **⚠️ Untriaged** section of
            `docs/feature-triage.md`, add an entry for each to
            `scripts/feature-triage/triage.json` (see
            `scripts/feature-triage/README.md`) and re-run `generate.py` — push to
            this branch, or ask Claude to do the triage pass.

            🤖 Generated with [Claude Code](https://claude.com/claude-code)
